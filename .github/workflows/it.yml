name: IT

on:
  workflow_dispatch:

jobs:
  url:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12.3'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run Scraper Chunk
        run: python main.py --url Investment

      - name: Cleanup CSV
        run: rm -rf csv/*_investment.csv

      - name: Upload Base Spreadsheet
        uses: actions/upload-artifact@v6
        with:
          name: results-base-investment
          path: spreadsheet/base.xlsx
          if-no-files-found: error

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "update: base investment url"
      

  worker:
    needs: url
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        chunk: [0, 1, 2, 3, 4] 
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12.3'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Cleanup CSV
        run: rm -rf csv/*_investment.csv
      
      - name: Run Scraper Chunk
        run: python main.py --id ${{ matrix.chunk }} --sheet Investment

      - name: List files to verify
        run: ls -R  # This shows all folders and files created

      - name: Upload Partial Data
        uses: actions/upload-artifact@v6
        with:
          name: results-${{ matrix.chunk }}
          path: csv/hl_${{ matrix.chunk }}_investment.csv
          if-no-files-found: error

  merge-results:
    needs: worker
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Pull latest changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12.3'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Download All Artifacts
        uses: actions/download-artifact@v6
        with:
          path: csv
          pattern: results-*
          merge-multiple: true

      - name: Merge and Commit
        run: python main.py --sheet Investment

      - name: Upload Partial Data
        uses: actions/upload-artifact@v6
        with:
          name: hl
          path: spreadsheet
          if-no-files-found: error

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "Updated: Mixed results"
      